<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whale Watch | 13F 슈퍼투자자 포트폴리오</title>
<style>
:root{
  --bg:#080d18;--bg2:#0f1626;--bg3:#15203a;--bg4:#1d2a4a;
  --border:#1c2540;--border2:#2a3760;
  --txt:#e6ecf7;--txt2:#8693b8;--txt3:#525d7d;
  --teal:#22d3ee;--teal2:rgba(34,211,238,.12);
  --green:#10b981;--green2:rgba(16,185,129,.12);
  --orange:#fb923c;--orange2:rgba(251,146,60,.12);
  --red:#ef4444;--red2:rgba(239,68,68,.12);
  --gold:#f5a623;
  --shadow-card:0 14px 40px rgba(0,0,0,.45);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Pretendard',sans-serif;background:var(--bg);color:var(--txt);line-height:1.5;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:50;background:rgba(8,13,24,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.hdr-l{display:flex;align-items:center;gap:12px;}
.hdr-logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#22d3ee,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:22px;}
.hdr-title h1{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.hdr-title p{font-size:11px;color:var(--txt3);margin-top:1px;}
.hdr-r{display:flex;align-items:center;gap:14px;}
.hdr-updated{font-size:11px;color:var(--txt3);}
.hdr-updated b{color:var(--txt2);font-weight:600;}
.toggle-btn{padding:8px 16px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:var(--txt2);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px;}
.toggle-btn:hover{border-color:var(--teal);color:var(--teal);}
.toggle-btn.active{background:var(--teal2);border-color:var(--teal);color:var(--teal);}

/* ── LAYOUT ── */
.main{max-width:1200px;margin:0 auto;padding:32px 24px 64px;}
.view{display:none;}
.view.active{display:block;}

/* ── SOLO VIEW (single investor) ── */
.solo-wrap{position:relative;display:flex;align-items:center;justify-content:center;gap:20px;}
.nav-arrow{flex-shrink:0;width:46px;height:46px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);color:var(--txt2);cursor:pointer;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit;}
.nav-arrow:hover{background:var(--bg3);border-color:var(--teal);color:var(--teal);transform:scale(1.06);}
.nav-arrow:disabled{opacity:.3;cursor:not-allowed;transform:none;}

.card{flex:1;max-width:880px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:var(--shadow-card);}
.card-strip{height:5px;background:var(--accent,#22d3ee);}
.card-head{padding:32px 36px 22px;display:flex;align-items:center;gap:24px;border-bottom:1px solid var(--border);}
.badge-svg{width:96px;height:96px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#fff;letter-spacing:-.5px;box-shadow:0 6px 20px rgba(0,0,0,.4);}
.head-text{flex:1;min-width:0;}
.style-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 11px;border-radius:14px;font-size:11px;font-weight:700;margin-bottom:8px;}
.style-pill.value{background:var(--green2);color:var(--green);}
.style-pill.macro{background:var(--orange2);color:var(--orange);}
.style-pill.contrarian{background:var(--red2);color:var(--red);}
.head-name{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:3px;}
.head-name .en{font-size:14px;font-weight:500;color:var(--txt3);margin-left:8px;}
.head-fund{font-size:13px;color:var(--txt2);margin-bottom:10px;}
.head-tagline{font-size:13px;color:var(--txt2);line-height:1.6;}

.card-body{display:grid;grid-template-columns:1fr 1.2fr;gap:24px;padding:28px 36px 24px;}
@media(max-width:780px){.card-body{grid-template-columns:1fr;}}

.chart-block{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.chart-svg{width:100%;max-width:280px;aspect-ratio:1;}
.chart-center{font-size:11px;color:var(--txt3);text-align:center;}
.chart-center b{display:block;font-size:18px;color:var(--txt);font-weight:800;margin-bottom:2px;}

.holdings-block h3{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:12px;}
.holdings-table{width:100%;border-collapse:collapse;font-size:12px;}
.holdings-table th{text-align:left;color:var(--txt3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:6px 8px 8px;border-bottom:1px solid var(--border);}
.holdings-table th.r,.holdings-table td.r{text-align:right;}
.holdings-table tbody tr{border-bottom:1px solid var(--border);}
.holdings-table tbody tr:last-child{border-bottom:none;}
.holdings-table td{padding:9px 8px;}
.holdings-table td.tk{font-weight:700;font-family:'JetBrains Mono','SF Mono',monospace;font-size:11px;}
.holdings-table td.nm{color:var(--txt2);overflow:hidden;text-overflow:ellipsis;max-width:160px;white-space:nowrap;}
.holdings-table td.wt{color:var(--txt);font-weight:600;}
.holdings-table .swatch{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle;}

.card-foot{display:grid;grid-template-columns:repeat(3,1fr);gap:0;background:var(--bg);border-top:1px solid var(--border);}
.stat{padding:14px 20px;text-align:center;border-right:1px solid var(--border);}
.stat:last-child{border-right:none;}
.stat-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.stat-val{font-size:16px;font-weight:800;color:var(--txt);}

/* ── DOTS ── */
.dots{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:24px;flex-wrap:wrap;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border2);cursor:pointer;transition:all .15s;border:none;padding:0;}
.dot:hover{transform:scale(1.4);}
.dot.active{width:26px;border-radius:5px;}

/* ── EMPTY STATE ── */
.empty{padding:36px 28px;text-align:center;color:var(--txt3);font-size:13px;line-height:1.7;}
.empty b{display:block;font-size:14px;color:var(--txt2);margin-bottom:4px;}

/* ── GROUP VIEW ── */
.group-section{margin-bottom:48px;}
.group-section:last-child{margin-bottom:0;}
.group-head{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.group-title{font-size:20px;font-weight:800;}
.group-count{font-size:12px;color:var(--txt3);}
.group-desc{font-size:12px;color:var(--txt3);margin-left:auto;}

.mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.mini-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .15s;text-align:left;font-family:inherit;color:inherit;}
.mini-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3);}
.mini-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.mini-badge{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
.mini-name{font-size:14px;font-weight:700;line-height:1.2;}
.mini-fund{font-size:10px;color:var(--txt3);margin-top:2px;}
.mini-tickers{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;min-height:22px;}
.mini-tk{font-size:10px;font-family:'JetBrains Mono','SF Mono',monospace;font-weight:700;background:var(--bg3);padding:2px 7px;border-radius:5px;color:var(--txt2);}
.mini-foot{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--txt3);}
.mini-foot b{color:var(--txt2);font-weight:700;}
.mini-empty{font-size:10px;color:var(--txt3);font-style:italic;}

/* ── FOOTER ── */
.foot{border-top:1px solid var(--border);padding:24px 20px;text-align:center;color:var(--txt3);font-size:11px;line-height:1.7;}
.foot a{color:var(--txt3);}.foot a:hover{color:var(--txt2);}
.foot .disclaimer{margin-top:8px;font-size:10px;}

/* ── TOOLTIP ── */
.tooltip{position:fixed;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--txt);pointer-events:none;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.5);opacity:0;transition:opacity .12s;}
.tooltip.show{opacity:1;}
.tooltip b{font-weight:700;display:block;margin-bottom:2px;}
.tooltip .pct{color:var(--teal);font-weight:700;}

/* ── RESPONSIVE ── */
@media(max-width:680px){
  .hdr{padding:12px 14px;}
  .hdr-title h1{font-size:15px;}
  .hdr-title p{display:none;}
  .hdr-updated{display:none;}
  .main{padding:20px 12px 48px;}
  .nav-arrow{width:38px;height:38px;font-size:16px;}
  .solo-wrap{gap:8px;}
  .card-head{padding:22px 20px 16px;flex-direction:column;text-align:center;gap:14px;}
  .card-body{padding:20px 20px;}
  .head-name{font-size:22px;}
  .badge-svg{width:80px;height:80px;font-size:28px;}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <div class="hdr-logo">🐋</div>
    <div class="hdr-title">
      <h1>Whale Watch</h1>
      <p>13F 슈퍼투자자 포트폴리오 추적</p>
    </div>
  </div>
  <div class="hdr-r">
    <div class="hdr-updated">마지막 갱신: <b id="updatedAt">—</b></div>
    <button class="toggle-btn" id="toggleBtn">
      <span id="toggleIcon">⊞</span> <span id="toggleLbl">한 번에 보기</span>
    </button>
  </div>
</header>

<main class="main">

  <!-- SOLO VIEW -->
  <section class="view active" id="soloView">
    <div class="solo-wrap">
      <button class="nav-arrow" id="prevBtn" aria-label="이전">‹</button>
      <article class="card" id="soloCard"></article>
      <button class="nav-arrow" id="nextBtn" aria-label="다음">›</button>
    </div>
    <div class="dots" id="dots"></div>
  </section>

  <!-- GROUP VIEW -->
  <section class="view" id="groupView"></section>

</main>

<footer class="foot">
  <div>데이터 출처: <a href="https://www.sec.gov/edgar" target="_blank" rel="noopener">SEC EDGAR 13F 공시</a> · 분기 종료 후 최대 45일 지연</div>
  <div class="disclaimer">표시되는 보유 내역은 미국 상장 롱 포지션만 포함하며 공매도·현금·해외주식·채권은 제외됩니다. 투자 권유가 아닙니다.</div>
</footer>

<div class="tooltip" id="tooltip"></div>

<script>
const PALETTE = ['#22d3ee','#10b981','#a78bfa','#f5a623','#ec4899','#fb923c','#6366f1','#06b6d4','#84cc16','#f43f5e','#facc15','#14b8a6'];

const fmtMoney = (v) => {
  if (v == null) return '—';
  const a = Math.abs(v);
  if (a >= 1e12) return '$' + (v/1e12).toFixed(2) + 'T';
  if (a >= 1e9)  return '$' + (v/1e9).toFixed(2) + 'B';
  if (a >= 1e6)  return '$' + (v/1e6).toFixed(1) + 'M';
  if (a >= 1e3)  return '$' + (v/1e3).toFixed(0) + 'K';
  return '$' + v.toFixed(0);
};
const fmtDate = (s) => s ? s.slice(0,10) : '—';

let DATA = null;
let idx = 0;
let mode = 'solo';

async function load(){
  try {
    const r = await fetch('./data/investors.json?_=' + Date.now());
    DATA = await r.json();
  } catch(e){
    document.getElementById('soloCard').innerHTML = `<div class="empty"><b>데이터를 불러올 수 없습니다.</b>data/investors.json 경로를 확인하세요.</div>`;
    return;
  }
  document.getElementById('updatedAt').textContent = DATA.last_updated ? fmtDate(DATA.last_updated) : '데이터 갱신 대기 중';
  renderDots();
  renderSolo();
  renderGroup();
}

function badgeHTML(inv, size=96){
  const fs = Math.round(size * 0.36);
  return `<div class="badge-svg" style="width:${size}px;height:${size}px;font-size:${fs}px;background:linear-gradient(135deg,${inv.color},${shade(inv.color,-25)});">${inv.initials}</div>`;
}
function shade(hex,p){
  const n = parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  r = Math.max(0,Math.min(255, r + Math.round(255*p/100)));
  g = Math.max(0,Math.min(255, g + Math.round(255*p/100)));
  b = Math.max(0,Math.min(255, b + Math.round(255*p/100)));
  return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

function pieSVG(holdings, totalValue){
  if (!holdings || holdings.length === 0) return '';
  const top = holdings.slice(0, 8);
  const rest = holdings.slice(8);
  const slices = top.map(h => ({label: h.ticker, value: h.value_usd, weight: h.weight, name: h.name}));
  if (rest.length){
    const restVal = rest.reduce((s,h) => s + (h.value_usd||0), 0);
    const restWt  = rest.reduce((s,h) => s + (h.weight||0), 0);
    slices.push({label:'기타', value:restVal, weight:restWt, name:`외 ${rest.length}종목`, isRest:true});
  }
  const total = slices.reduce((s,x) => s + x.value, 0) || 1;
  const cx=100, cy=100, r=88, ri=54;
  let a0 = -Math.PI/2;
  let paths = '';
  slices.forEach((s, i) => {
    const frac = s.value / total;
    const a1 = a0 + frac * Math.PI * 2;
    const large = frac > 0.5 ? 1 : 0;
    const x0 = cx + r*Math.cos(a0), y0 = cy + r*Math.sin(a0);
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const xi0 = cx + ri*Math.cos(a0), yi0 = cy + ri*Math.sin(a0);
    const xi1 = cx + ri*Math.cos(a1), yi1 = cy + ri*Math.sin(a1);
    const color = s.isRest ? '#3a4566' : PALETTE[i % PALETTE.length];
    const d = `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} L ${xi1} ${yi1} A ${ri} ${ri} 0 ${large} 0 ${xi0} ${yi0} Z`;
    paths += `<path d="${d}" fill="${color}" data-label="${s.label}" data-name="${s.name||''}" data-weight="${(s.weight||0).toFixed(2)}" data-value="${s.value}" style="transition:opacity .15s;cursor:pointer;"/>`;
    a0 = a1;
  });
  return `<svg class="chart-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
}

function renderSolo(){
  const inv = DATA.investors[idx];
  const styleMeta = DATA.styles[inv.style];
  const top10 = (inv.holdings || []).slice(0, 10);

  const tbl = top10.length ? `
    <table class="holdings-table">
      <thead><tr><th>#</th><th>티커</th><th>종목</th><th class="r">비중</th><th class="r">평가액</th></tr></thead>
      <tbody>${top10.map((h,i)=>`
        <tr>
          <td style="color:var(--txt3)">${i+1}</td>
          <td class="tk"><span class="swatch" style="background:${i<8 ? PALETTE[i%PALETTE.length] : '#3a4566'}"></span>${h.ticker || '—'}</td>
          <td class="nm" title="${h.name||''}">${h.name||'—'}</td>
          <td class="r wt">${(h.weight||0).toFixed(1)}%</td>
          <td class="r" style="color:var(--txt2)">${fmtMoney(h.value_usd)}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : `<div class="empty"><b>데이터 갱신 대기 중</b>다음 13F 공시 동기화 시 자동으로 채워집니다.</div>`;

  const html = `
    <div class="card-strip" style="background:linear-gradient(90deg,${inv.color},${shade(inv.color,-15)})"></div>
    <div class="card-head">
      ${badgeHTML(inv, 96)}
      <div class="head-text">
        <span class="style-pill ${inv.style}">● ${styleMeta.label}</span>
        <div class="head-name">${inv.name_ko}<span class="en">${inv.name}</span></div>
        <div class="head-fund">${inv.fund}</div>
        <div class="head-tagline">${inv.tagline}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="chart-block">
        ${top10.length ? pieSVG(inv.holdings, inv.total_value_usd) : `<div class="empty" style="padding:60px 20px;"><b>차트 대기 중</b>13F 데이터 동기화 후 표시됩니다.</div>`}
        ${top10.length ? `<div class="chart-center"><b>${fmtMoney(inv.total_value_usd)}</b>총 운용액 (Long, US Equity)</div>` : ''}
      </div>
      <div class="holdings-block">
        <h3>상위 보유 종목 ${top10.length ? `(Top ${top10.length})` : ''}</h3>
        ${tbl}
      </div>
    </div>
    <div class="card-foot">
      <div class="stat"><div class="stat-lbl">공시일</div><div class="stat-val">${fmtDate(inv.filing_date)}</div></div>
      <div class="stat"><div class="stat-lbl">보고 분기</div><div class="stat-val">${fmtDate(inv.period_of_report)}</div></div>
      <div class="stat"><div class="stat-lbl">보유 종목 수</div><div class="stat-val">${inv.holdings_count || 0}</div></div>
    </div>
  `;
  document.getElementById('soloCard').innerHTML = html;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active', i===idx));
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === DATA.investors.length - 1;

  // pie hover
  const tip = document.getElementById('tooltip');
  document.querySelectorAll('.chart-svg path').forEach(p => {
    p.addEventListener('mousemove', e => {
      tip.innerHTML = `<b>${p.dataset.label}</b>${p.dataset.name?p.dataset.name+'<br>':''}<span class="pct">${p.dataset.weight}%</span> · ${fmtMoney(+p.dataset.value)}`;
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top  = (e.clientY + 14) + 'px';
      tip.classList.add('show');
    });
    p.addEventListener('mouseleave', () => tip.classList.remove('show'));
  });
}

function renderDots(){
  const c = document.getElementById('dots');
  c.innerHTML = DATA.investors.map((inv,i)=>`<button class="dot" data-i="${i}" style="background:${inv.color}" aria-label="${inv.name_ko}"></button>`).join('');
  c.querySelectorAll('.dot').forEach(d => d.addEventListener('click', e => { idx = +d.dataset.i; renderSolo(); }));
}

function renderGroup(){
  const styleOrder = ['value','macro','contrarian'];
  const html = styleOrder.map(s => {
    const meta = DATA.styles[s];
    const list = DATA.investors.filter(inv => inv.style === s);
    return `
      <div class="group-section">
        <div class="group-head">
          <div class="group-title" style="color:${meta.color}">${meta.label}</div>
          <div class="group-count">· ${list.length}명</div>
          <div class="group-desc">${meta.description}</div>
        </div>
        <div class="mini-grid">${list.map(inv => miniCard(inv)).join('')}</div>
      </div>`;
  }).join('');
  document.getElementById('groupView').innerHTML = html;
  document.querySelectorAll('.mini-card').forEach(c => c.addEventListener('click', () => {
    const id = c.dataset.id;
    idx = DATA.investors.findIndex(x => x.id === id);
    setMode('solo');
  }));
}

function miniCard(inv){
  const top3 = (inv.holdings || []).slice(0, 3);
  const tickers = top3.length
    ? top3.map(h => `<span class="mini-tk">${h.ticker}</span>`).join('')
    : `<span class="mini-empty">데이터 갱신 대기 중</span>`;
  return `
    <button class="mini-card" data-id="${inv.id}">
      <div class="mini-top">
        <div class="mini-badge" style="background:linear-gradient(135deg,${inv.color},${shade(inv.color,-25)})">${inv.initials}</div>
        <div>
          <div class="mini-name">${inv.name_ko}</div>
          <div class="mini-fund">${inv.fund}</div>
        </div>
      </div>
      <div class="mini-tickers">${tickers}</div>
      <div class="mini-foot"><span>총 운용액</span><b>${fmtMoney(inv.total_value_usd)}</b></div>
    </button>`;
}

function setMode(m){
  mode = m;
  document.getElementById('soloView').classList.toggle('active', m==='solo');
  document.getElementById('groupView').classList.toggle('active', m==='group');
  const btn = document.getElementById('toggleBtn');
  btn.classList.toggle('active', m==='group');
  document.getElementById('toggleIcon').textContent = m==='group' ? '◑' : '⊞';
  document.getElementById('toggleLbl').textContent = m==='group' ? '한 명씩 보기' : '한 번에 보기';
  if (m==='solo') renderSolo();
}

document.getElementById('prevBtn').addEventListener('click', () => { if (idx>0){ idx--; renderSolo(); } });
document.getElementById('nextBtn').addEventListener('click', () => { if (idx<DATA.investors.length-1){ idx++; renderSolo(); } });
document.getElementById('toggleBtn').addEventListener('click', () => setMode(mode==='solo' ? 'group' : 'solo'));
document.addEventListener('keydown', e => {
  if (mode!=='solo') return;
  if (e.key==='ArrowLeft' && idx>0){ idx--; renderSolo(); }
  if (e.key==='ArrowRight' && idx<DATA.investors.length-1){ idx++; renderSolo(); }
});

load();
</script>
</body>
</html>
